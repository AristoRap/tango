name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.20.2

      - uses: actions/setup-go@v6
        with:
          go-version: '1.21.x'
          cache: false

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev

      - name: Check, test, and build
        run: make ci
