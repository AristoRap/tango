name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  CRYSTAL_VERSION: 1.20.2
  GO_VERSION: 1.21.x

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ env.CRYSTAL_VERSION }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev

      - name: Verify release version
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Release tags must look like v0.1.0" >&2
            exit 1
          }

          version="${GITHUB_REF_NAME#v}"
          shard_version="$(awk '$1 == "version:" { print $2; exit }' shard.yml)"
          source_version="$(shards version src/tango)"

          [[ "$version" == "$shard_version" && "$version" == "$source_version" ]] || {
            echo "Tag $version does not match shard.yml ($shard_version) and the resolved Tango source version ($source_version)" >&2
            exit 1
          }

      - name: Check, test, and build
        run: make ci

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
          - runner: macos-latest
            platform: macos
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ env.CRYSTAL_VERSION }}

      - name: Install LLVM
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev

      - name: Build release binary
        run: make build-release

      - name: Package release binary
        run: |
          version="${GITHUB_REF_NAME#v}"
          architecture="$(uname -m)"
          archive="tango-${version}-${{ matrix.platform }}-${architecture}.tar.gz"

          mkdir -p dist/package
          cp bin/tango README.md LICENSE dist/package/
          tar -C dist/package -czf "dist/$archive" tango README.md LICENSE

          if command -v sha256sum >/dev/null; then
            (cd dist && sha256sum "$archive" > "$archive.sha256")
          else
            (cd dist && shasum -a 256 "$archive" > "$archive.sha256")
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}-${{ runner.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
